services:
  - type: cron
    name: doomsday-watcher
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python watcher.py
    disk:
      name: seen-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: YOUR_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false